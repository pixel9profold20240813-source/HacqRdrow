<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HacqR 抽獎助手 - 會員加成專業版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // 使用 Lucide 圖標的簡單組件
        const Icon = ({ name, size = 20, className = "" }) => {
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        function App() {
            const [apiKey, setApiKey] = useState('AIzaSyAYQnHhRUEewqTVDZmeTxV6hRXZFt_ZWtY');
            const [videoUrl, setVideoUrl] = useState('');
            const [comments, setComments] = useState([]);
            const [loading, setLoading] = useState(false);
            const [winners, setWinners] = useState([]);
            const [isDrawing, setIsDrawing] = useState(false);
            const [error, setError] = useState(null);
            const [progress, setProgress] = useState(0);

            const [members, setMembers] = useState([]);
            const [keyword, setKeyword] = useState('');
            const [winnerCount, setWinnerCount] = useState(1);
            const [filters, setFilters] = useState({ removeDuplicates: true, onlyWithKeyword: false });

            // 初始化圖標
            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [loading, winners, isDrawing, members]);

            const extractVideoId = (url) => {
                const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[7].length === 11) ? match[7] : null;
            };

            const handleMemberUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n');
                    const extractedMembers = rows.slice(1)
                        .map(row => row.split(',')[0].replace(/"/g, '').trim())
                        .filter(name => name.length > 0);
                    setMembers(extractedMembers);
                };
                reader.readAsText(file);
            };

            const fetchComments = async () => {
                const videoId = extractVideoId(videoUrl);
                if (!videoId) { alert("網址格式錯誤"); return; }
                setLoading(true);
                setError(null);
                let allComments = [];
                let nextPageToken = '';
                try {
                    do {
                        const response = await fetch(
                            `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet,replies&videoId=${videoId}&maxResults=100&pageToken=${nextPageToken}&key=${apiKey}`
                        );
                        const data = await response.json();
                        if (data.error) throw new Error(data.error.message);
                        data.items.forEach(item => {
                            const main = item.snippet.topLevelComment.snippet;
                            allComments.push({ author: main.authorDisplayName, authorId: main.authorChannelId.value, text: main.textDisplay, avatar: main.authorProfileImageUrl });
                        });
                        nextPageToken = data.nextPageToken || '';
                        setComments([...allComments]);
                        setProgress(allComments.length);
                    } while (nextPageToken);
                } catch (err) {
                    alert("同步失敗: " + err.message);
                } finally { setLoading(false); }
            };

            const lotteryPool = useMemo(() => {
                const pool = [];
                const seenUsers = new Set();
                comments.forEach(c => {
                    if (filters.onlyWithKeyword && keyword && !c.text.toLowerCase().includes(keyword.toLowerCase())) return;
                    const isMember = members.includes(c.author);
                    if (isMember) {
                        pool.push({ ...c, isMember: true });
                    } else if (filters.removeDuplicates) {
                        if (!seenUsers.has(c.authorId)) {
                            seenUsers.add(c.authorId);
                            pool.push({ ...c, isMember: false });
                        }
                    } else {
                        pool.push({ ...c, isMember: false });
                    }
                });
                return pool;
            }, [comments, keyword, members, filters]);

            const draw = () => {
                if (lotteryPool.length === 0) return;
                setIsDrawing(true);
                let count = 0;
                const timer = setInterval(() => {
                    const temp = [];
                    const poolCopy = [...lotteryPool];
                    for (let i = 0; i < Math.min(winnerCount, poolCopy.length); i++) {
                        const idx = Math.floor(Math.random() * poolCopy.length);
                        temp.push(poolCopy.splice(idx, 1)[0]);
                    }
                    setWinners(temp);
                    if (++count >= 30) { clearInterval(timer); setIsDrawing(false); }
                }, 80);
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <header className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row justify-between items-center">
                        <div className="flex items-center gap-4">
                            <div className="bg-red-600 p-3 rounded-2xl text-white shadow-lg"><Icon name="youtube" size={32}/></div>
                            <div>
                                <h1 className="text-2xl font-black">HacqR 抽獎助手</h1>
                                <p className="text-xs font-bold text-slate-400">GITHUB PAGES 版本</p>
                            </div>
                        </div>
                        <div className="bg-slate-50 px-8 py-4 rounded-3xl border border-slate-100 text-center">
                            <p className="text-xs font-black text-slate-400">抽獎池名額</p>
                            <p className="text-4xl font-black text-red-600">{lotteryPool.length}</p>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-4 space-y-6">
                            <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <h3 className="font-black text-blue-600 mb-4 flex items-center gap-2"><Icon name="file-text"/> 1. 會員清單</h3>
                                <div className={`relative border-2 border-dashed rounded-2xl p-6 text-center ${members.length > 0 ? 'bg-blue-50 border-blue-200' : 'border-slate-100'}`}>
                                    <input type="file" accept=".csv" onChange={handleMemberUpload} className="absolute inset-0 opacity-0 cursor-pointer" />
                                    <p className="text-sm font-bold text-slate-500">{members.length > 0 ? `✅ 已載入 ${members.length} 人` : "點擊上傳會員 CSV"}</p>
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
                                <h3 className="font-black text-red-600 mb-4 flex items-center gap-2"><Icon name="youtube"/> 2. 影片網址</h3>
                                <input type="text" placeholder="YouTube 網址" value={videoUrl} onChange={e=>setVideoUrl(e.target.value)} className="w-full p-3 bg-slate-50 rounded-xl mb-3 border border-slate-100 outline-none focus:ring-2 focus:ring-red-500"/>
                                <button onClick={fetchComments} disabled={loading || !videoUrl} className="w-full bg-red-600 text-white py-4 rounded-xl font-black shadow-lg shadow-red-50 disabled:bg-slate-200">
                                    {loading ? "同步中..." : "抓取留言"}
                                </button>
                            </div>
                            <div className="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm space-y-4">
                                <h3 className="font-black text-purple-600 mb-2 flex items-center gap-2"><Icon name="filter"/> 3. 規則設定</h3>
                                <div className="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                                    <span className="text-xs font-black">移除重複</span>
                                    <input type="checkbox" checked={filters.removeDuplicates} onChange={e=>setFilters({...filters, removeDuplicates: e.target.checked})} className="w-5 h-5 accent-red-600"/>
                                </div>
                                <div className="p-3 bg-slate-50 rounded-xl space-y-2">
                                    <div className="flex justify-between"><span className="text-xs font-black">限定關鍵字</span><input type="checkbox" checked={filters.onlyWithKeyword} onChange={e=>setFilters({...filters, onlyWithKeyword: e.target.checked})}/></div>
                                    <input type="text" value={keyword} onChange={e=>setKeyword(e.target.value)} disabled={!filters.onlyWithKeyword} className="w-full p-2 text-xs border rounded outline-none disabled:opacity-30"/>
                                </div>
                                <div>
                                    <label className="text-xs font-black text-slate-400 block mb-2">中獎人數: {winnerCount}</label>
                                    <input type="range" min="1" max="10" value={winnerCount} onChange={e=>setWinnerCount(parseInt(e.target.value))} className="w-full accent-red-600"/>
                                </div>
                            </div>
                        </div>

                        <div className="lg:col-span-8 space-y-6">
                            <div className="bg-white rounded-[3rem] p-10 shadow-xl border border-slate-100 min-h-[550px] flex flex-col justify-center items-center relative">
                                {winners.length > 0 ? (
                                    <div className={`grid ${winners.length > 1 ? 'grid-cols-2' : 'grid-cols-1'} gap-4 w-full max-w-2xl transition-all ${isDrawing ? 'opacity-30 blur-md' : ''}`}>
                                        {winners.map((w, i) => (
                                            <div key={i} className="bg-white p-6 rounded-[2rem] border-2 border-slate-50 shadow-sm text-center relative">
                                                <img src={w.avatar} className="w-20 h-20 rounded-full border-4 border-white shadow-md mx-auto mb-3" />
                                                <h4 className="font-black text-slate-800 truncate">{w.author}</h4>
                                                <p className="text-[10px] text-slate-400 italic line-clamp-1 mt-1">"{w.text}"</p>
                                                {w.isMember && <div className="mt-2 inline-block bg-yellow-100 text-yellow-700 text-[10px] font-black px-3 py-1 rounded-full">★ 頻道會員</div>}
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="text-slate-100"><Icon name="trophy" size={160} /></div>
                                )}
                                <div className="mt-12 w-full max-w-sm">
                                    <button onClick={draw} disabled={lotteryPool.length === 0 || isDrawing} className="w-full bg-slate-900 text-white py-6 rounded-[2rem] text-3xl font-black shadow-2xl active:scale-95 disabled:bg-slate-100">
                                        {isDrawing ? "選拔中..." : "開始抽獎"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
