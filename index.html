<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HacqR 抽獎助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { Search, Gift, Users, Star, AlertCircle, Loader2, Youtube, Trophy, FileText, CheckCircle2 } = lucide;

        function App() {
            // 建議將 API Key 改為空字串，讓使用者輸入
            const [apiKey, setApiKey] = useState(''); 
            const [videoUrl, setVideoUrl] = useState('');
            const [comments, setComments] = useState([]);
            const [loading, setLoading] = useState(false);
            const [winner, setWinner] = useState(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [error, setError] = useState(null);
            const [progress, setProgress] = useState(0);
            const [members, setMembers] = useState([]);
            const [keyword, setKeyword] = useState('');

            const extractVideoId = (url) => {
                const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?))\??v?=?([^#&?]*).*/;
                const match = url.match(regExp);
                return (match && match[7].length === 11) ? match[7] : null;
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    const text = event.target.result;
                    const rows = text.split('\n');
                    const extractedMembers = rows.slice(1)
                        .map(row => row.split(',')[0].replace(/"/g, '').trim())
                        .filter(name => name.length > 0);
                    setMembers(extractedMembers);
                };
                reader.readAsText(file);
            };

            const fetchAllComments = async () => {
                const videoId = extractVideoId(videoUrl);
                if (!videoId || !apiKey) {
                    alert(!apiKey ? "請確認 API 金鑰" : "請輸入正確的影片網址");
                    return;
                }
                setLoading(true);
                let allComments = [];
                let nextPageToken = '';
                try {
                    do {
                        const response = await fetch(`https://www.googleapis.com/youtube/v3/commentThreads?part=snippet,replies&videoId=${videoId}&maxResults=100&pageToken=${nextPageToken}&key=${apiKey}`);
                        const data = await response.json();
                        if (data.error) throw new Error(data.error.message);
                        data.items.forEach(item => {
                            const mainSnippet = item.snippet.topLevelComment.snippet;
                            allComments.push({ id: item.id, author: mainSnippet.authorDisplayName, authorId: mainSnippet.authorChannelId.value, text: mainSnippet.textDisplay, avatar: mainSnippet.authorProfileImageUrl });
                            if (item.replies && item.replies.comments) {
                                item.replies.comments.forEach(reply => {
                                    allComments.push({ id: reply.id, author: reply.snippet.authorDisplayName, authorId: reply.snippet.authorChannelId.value, text: reply.snippet.textDisplay, avatar: reply.snippet.authorProfileImageUrl, isReply: true });
                                });
                            }
                        });
                        nextPageToken = data.nextPageToken || '';
                        setComments([...allComments]);
                        setProgress(allComments.length);
                    } while (nextPageToken);
                } catch (err) { alert("連線失敗：" + err.message); } finally { setLoading(false); }
            };

            const lotteryPool = useMemo(() => {
                const pool = [];
                const seenUsers = new Set();
                comments.forEach(c => {
                    if (keyword && !c.text.toLowerCase().includes(keyword.toLowerCase())) return;
                    const isMember = members.includes(c.author);
                    if (isMember) { pool.push({ ...c, isMember: true }); } 
                    else if (!seenUsers.has(c.authorId)) { seenUsers.add(c.authorId); pool.push({ ...c, isMember: false }); }
                });
                return pool;
            }, [comments, keyword, members]);

            const draw = () => {
                if (lotteryPool.length === 0) return;
                setIsDrawing(true);
                let count = 0;
                const timer = setInterval(() => {
                    setWinner(lotteryPool[Math.floor(Math.random() * lotteryPool.length)]);
                    count++;
                    if (count > 30) { clearInterval(timer); setIsDrawing(false); }
                }, 80);
            };

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 text-slate-900">
                    <div className="max-w-6xl mx-auto">
                        <header className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 mb-8 flex flex-col md:flex-row justify-between items-center gap-6">
                            <div className="flex items-center gap-4">
                                <div className="bg-red-50 p-3 rounded-2xl"><Youtube className="text-red-600" size={40} /></div>
                                <div>
                                    <h1 className="text-2xl font-black">HacqR 抽獎助手</h1>
                                    <p className="text-slate-400 text-sm font-medium italic">支援 CSV 會員清單自動比對</p>
                                </div>
                            </div>
                            <div className="flex gap-6">
                                <div className="text-center"><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">已載入會員</p><p className="text-2xl font-black text-blue-600">{members.length}</p></div>
                                <div className="text-center"><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">有效留言</p><p className="text-2xl font-black text-red-600">{lotteryPool.length}</p></div>
                            </div>
                        </header>
                        
                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                           {/* 您的其餘介面代碼保持不變，貼在這裡即可 */}
                           {/* (為節省版面，請將原代碼中的 <div className="lg:col-span-4..."> 到最後的 </div> 複製貼上於此) */}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
