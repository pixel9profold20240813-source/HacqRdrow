<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 留言抽獎系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto+Sans+TC', sans-serif;
            background-color: #f1f5f9;
        }

        .sidebar-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .main-display {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
        }

        .winner-pop {
            animation: winnerPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes winnerPop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .loading-ring {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-8">
        
        <!-- 左側設定區塊 -->
        <div class="w-full lg:w-80 flex flex-col gap-6">
            
            <!-- 1. 會員名單 -->
            <div class="sidebar-card p-6 border border-gray-100">
                <div class="flex items-center gap-2 mb-4 text-blue-500 font-bold">
                    <i class="fa-regular fa-file-lines"></i>
                    <span>1. 上傳會員名單</span>
                </div>
                <label class="block w-full">
                    <div class="border-2 border-dashed border-gray-200 rounded-xl p-4 hover:border-blue-400 transition-all cursor-pointer bg-gray-50 text-center">
                        <i class="fa-solid fa-cloud-arrow-up text-gray-400 mb-2 text-xl"></i>
                        <p class="text-xs text-gray-500">點擊上傳 CSV 檔案</p>
                        <input type="file" id="csvFile" class="hidden" accept=".csv">
                    </div>
                </label>
                <p id="memberStatus" class="mt-2 text-[11px] text-green-600 font-medium hidden"></p>
            </div>

            <!-- 2. 抓取留言 -->
            <div class="sidebar-card p-6 border border-gray-100">
                <div class="flex items-center gap-2 mb-4 text-red-500 font-bold">
                    <i class="fa-brands fa-youtube"></i>
                    <span>2. 抓取影片留言</span>
                </div>
                <input type="text" id="videoUrl" placeholder="貼上 YouTube 網址" 
                    class="w-full px-3 py-2 bg-gray-100 border-none rounded-lg text-sm focus:ring-2 focus:ring-red-400 outline-none mb-3">
                
                <button id="fetchBtn" class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                    <span id="fetchBtnText">同步留言</span>
                    <div id="fetchLoading" class="loading-ring hidden"></div>
                </button>
                <p id="fetchStatus" class="mt-2 text-[11px] text-gray-400 font-medium text-center"></p>
            </div>

            <!-- 3. 篩選設定 -->
            <div class="sidebar-card p-6 border border-gray-100">
                <div class="flex items-center gap-2 mb-4 text-purple-500 font-bold">
                    <i class="fa-solid fa-filter"></i>
                    <span>3. 其他篩選</span>
                </div>
                <input type="text" id="keyword" placeholder="包含關鍵字 (選填)" 
                    class="w-full px-3 py-2 bg-gray-100 border-none rounded-lg text-sm focus:ring-2 focus:ring-purple-400 outline-none">
            </div>
        </div>

        <!-- 右側抽獎展示區 -->
        <div class="flex-1 main-display p-8 md:p-12 flex flex-col items-center justify-center min-h-[600px] relative overflow-hidden">
            
            <div id="winnerContainer" class="w-full flex flex-col items-center justify-center flex-1">
                <!-- 初始狀態 -->
                <div id="idleState" class="text-center">
                    <div class="w-32 h-32 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
                        <i class="fa-solid fa-gift text-gray-300 text-5xl"></i>
                    </div>
                    <h2 class="text-gray-400 text-xl font-medium">準備好就開始抽獎吧！</h2>
                </div>

                <!-- 中獎展示 -->
                <div id="winnerResult" class="hidden w-full text-center winner-pop">
                    <div class="relative inline-block mb-6">
                        <img id="winnerImg" src="" class="w-48 h-48 rounded-full border-8 border-white shadow-2xl object-cover mx-auto bg-gray-200">
                        <div id="memberTag" class="absolute -bottom-2 right-4 bg-yellow-400 text-black font-black text-xs px-3 py-1 rounded-full shadow-md hidden">
                            <i class="fa-solid fa-crown mr-1"></i>頻道會員
                        </div>
                    </div>
                    <h3 id="winnerName" class="text-4xl font-black text-gray-800 mb-4 break-all"></h3>
                    <div class="max-w-2xl mx-auto bg-gray-50 p-8 rounded-3xl border border-gray-100 relative">
                        <i class="fa-solid fa-quote-left absolute top-4 left-6 text-gray-200 text-3xl"></i>
                        <p id="winnerComment" class="text-lg text-gray-600 italic leading-relaxed"></p>
                        <i class="fa-solid fa-quote-right absolute bottom-4 right-6 text-gray-200 text-3xl"></i>
                    </div>
                </div>
            </div>

            <!-- 控制按鈕 -->
            <div class="w-full max-w-md mt-12">
                <button id="drawBtn" class="w-full bg-slate-900 hover:bg-black text-white font-black py-6 rounded-3xl text-2xl shadow-xl transition-all active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed">
                    開始抽獎
                </button>
                <p id="poolInfo" class="text-center mt-4 text-xs text-gray-400 font-bold tracking-widest uppercase"></p>
            </div>
        </div>
    </div>

    <!-- 錯誤提示 -->
    <div id="alertModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-red-100 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-triangle-exclamation text-2xl"></i>
            </div>
            <p id="alertMsg" class="text-gray-700 font-bold mb-6 text-lg"></p>
            <button onclick="closeAlert()" class="w-full bg-gray-900 text-white font-bold py-3 rounded-xl">確認</button>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAYQnHhRUEewqTVDZmeTxV6hRXZFt_ZWtY';
        let rawComments = [];
        let memberIds = new Set();
        let finalPool = [];

        // 1. CSV 會員處理
        document.getElementById('csvFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                const rows = text.split('\n');
                memberIds.clear();
                rows.forEach(row => {
                    const match = row.match(/UC[a-zA-Z0-9_-]{22}/);
                    if (match) memberIds.add(match[0]);
                });
                const status = document.getElementById('memberStatus');
                status.innerText = `✅ 已辨識 ${memberIds.size} 位會員`;
                status.classList.remove('hidden');
                calculatePool();
            };
            reader.readAsText(file);
        });

        // 2. 抓取留言
        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const url = document.getElementById('videoUrl').value.trim();
            const videoId = getYouTubeID(url);

            if (!videoId) {
                showMsg('請輸入正確的 YouTube 影片網址');
                return;
            }

            setFetchLoading(true);
            rawComments = [];

            try {
                let pageToken = '';
                do {
                    const apiUrl = `https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=100&pageToken=${pageToken}&key=${API_KEY}`;
                    const res = await fetch(apiUrl);
                    const data = await res.json();

                    if (data.error) throw new Error(data.error.message);
                    if (!data.items) break;

                    data.items.forEach(item => {
                        const c = item.snippet.topLevelComment.snippet;
                        rawComments.push({
                            id: c.authorChannelId.value,
                            name: c.authorDisplayName,
                            img: c.authorProfileImageUrl,
                            text: c.textOriginal
                        });
                    });

                    pageToken = data.nextPageToken || '';
                } while (pageToken);

                document.getElementById('fetchStatus').innerText = `同步完成！共 ${rawComments.length} 則留言`;
                calculatePool();

            } catch (err) {
                showMsg('抓取失敗：' + err.message);
            } finally {
                setFetchLoading(false);
            }
        });

        function getYouTubeID(url) {
            const regex = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?)|(shorts\/)|(live\/))\??v?=?([^#&?]*).*/;
            const match = url.match(regex);
            return (match && match[9].length === 11) ? match[9] : null;
        }

        function setFetchLoading(isLoading) {
            const btnText = document.getElementById('fetchBtnText');
            const loader = document.getElementById('fetchLoading');
            const btn = document.getElementById('fetchBtn');
            if (isLoading) {
                btnText.classList.add('hidden');
                loader.classList.remove('hidden');
                btn.disabled = true;
            } else {
                btnText.classList.remove('hidden');
                loader.classList.add('hidden');
                btn.disabled = false;
            }
        }

        // 3. 計算抽獎池 (核心邏輯)
        function calculatePool() {
            const keyword = document.getElementById('keyword').value.trim().toLowerCase();
            const filtered = keyword ? rawComments.filter(c => c.text.toLowerCase().includes(keyword)) : rawComments;
            
            const uniqueUsers = new Set();
            finalPool = [];

            filtered.forEach(c => {
                const isMember = memberIds.has(c.id);
                if (isMember) {
                    // 會員：每一則留言都計入 (無限刷)
                    finalPool.push({ ...c, isMember: true });
                } else {
                    // 一般用戶：自動去重
                    if (!uniqueUsers.has(c.id)) {
                        uniqueUsers.add(c.id);
                        finalPool.push({ ...c, isMember: false });
                    }
                }
            });

            document.getElementById('poolInfo').innerText = finalPool.length > 0 ? `目前抽獎池人次：${finalPool.length}` : '';
        }

        // 4. 開始抽獎
        document.getElementById('drawBtn').addEventListener('click', () => {
            calculatePool(); // 抽之前再確認一次過濾條件
            if (finalPool.length === 0) {
                showMsg('抽獎池目前沒有符合條件的人選！');
                return;
            }

            const btn = document.getElementById('drawBtn');
            btn.disabled = true;
            btn.innerText = '正在開獎...';

            let count = 0;
            const shuffle = setInterval(() => {
                const randomOne = finalPool[Math.floor(Math.random() * finalPool.length)];
                renderWinner(randomOne, false);
                count++;

                if (count > 25) {
                    clearInterval(shuffle);
                    const finalWinner = finalPool[Math.floor(Math.random() * finalPool.length)];
                    renderWinner(finalWinner, true);
                    btn.disabled = false;
                    btn.innerText = '開始抽獎';
                }
            }, 60);
        });

        function renderWinner(winner, isFinal) {
            document.getElementById('idleState').classList.add('hidden');
            const resultDiv = document.getElementById('winnerResult');
            resultDiv.classList.remove('hidden');

            if (isFinal) {
                resultDiv.classList.remove('winner-pop');
                void resultDiv.offsetWidth; // 重發動畫
                resultDiv.classList.add('winner-pop');
            }

            document.getElementById('winnerImg').src = winner.img;
            document.getElementById('winnerName').innerText = winner.name;
            document.getElementById('winnerComment').innerText = winner.text;
            
            const tag = document.getElementById('memberTag');
            winner.isMember ? tag.classList.remove('hidden') : tag.classList.add('hidden');
        }

        function showMsg(msg) {
            document.getElementById('alertMsg').innerText = msg;
            document.getElementById('alertModal').classList.replace('hidden', 'flex');
        }

        function closeAlert() {
            document.getElementById('alertModal').classList.replace('flex', 'hidden');
        }
    </script>
</body>
</html>
