<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 留言抽獎系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        
        body {
            font-family: "PingFang TC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans TC", "Roboto", sans-serif;
            background-color: #f1f5f9;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            border: 1px solid #f1f5f9;
        }

        .main-display {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        #winnerContainer {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 2rem;
            overflow: hidden;
            background: #fff;
        }

        /* 恢復您滿意的大型卡片佈局 */
        .yt-comment-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 1.2em;
            width: 100%;
            max-width: 800px;
            background: #ffffff;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            padding: 28px 32px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.08);
            transition: transform 0.05s ease-out;
            position: relative;
        }

        /* 純垂直跳動，絕不旋轉，不暈眩 */
        .drawing-active {
            animation: drawBounce 0.1s infinite alternate cubic-bezier(0.45, 0.05, 0.55, 0.95);
        }

        @keyframes drawBounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(12px); } 
        }

        .yt-avatar-container {
            position: relative;
            flex-shrink: 0;
        }

        .yt-avatar {
            width: 3.5em;
            height: 3.5em;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #f1f5f9;
        }

        /* 身份標籤：得獎時顯現，且縮放比例正確 */
        .status-badge {
            position: absolute;
            bottom: -0.4em;
            left: 50%;
            transform: translateX(-50%) scale(1.6);
            color: white;
            font-size: 0.5em;
            font-weight: 900;
            padding: 0.25em 1.2em;
            border-radius: 2em;
            white-space: nowrap;
            box-shadow: 0 4px 8px rgba(0,0,0,0.25);
            border: 1.5px solid #fff;
            z-index: 20;
        }

        .badge-pop-anim {
            animation: badgePopFinal 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes badgePopFinal {
            0% { transform: translateX(-50%) scale(0); opacity: 0; }
            100% { transform: translateX(-50%) scale(1.6); opacity: 1; }
        }

        .badge-subscribed { background-color: #2ba640; }
        .badge-vip { background-color: #ffca28; color: #000; }

        .yt-content {
            display: flex;
            flex-direction: column;
            text-align: left;
            flex: 1;
            min-width: 0;
        }

        .yt-header {
            display: flex;
            align-items: center;
            gap: 0.6em;
            margin-bottom: 0.3em;
        }

        .yt-author {
            font-weight: 700;
            font-size: 0.95em;
            color: #0f0f0f;
        }

        .yt-time { font-size: 0.8em; color: #606060; }

        .yt-text {
            font-size: 1.1em;
            line-height: 1.55em;
            color: #0f0f0f;
            word-break: break-word;
            white-space: pre-wrap;
            font-weight: 500;
            margin: 8px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .yt-actions {
            display: flex;
            align-items: center;
            gap: 1.5em;
            margin-top: 0.8em;
            color: #0f0f0f;
        }

        .yt-icon-btn { display: flex; align-items: center; gap: 0.5em; font-size: 0.8em; }
        .yt-icon-btn i { font-size: 1.4em; }

        .winner-final-pop {
            animation: winnerScale 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            border-color: #ffca28;
        }

        @keyframes winnerScale {
            0% { transform: scale(0.95); }
            100% { transform: scale(1); }
        }

        .bottom-control {
            border-top: 1px solid #f1f5f9;
            padding: 1.25rem;
            background: white;
        }

        .loading-spin {
            width: 1.2em; height: 1.2em;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-6 h-screen">
    <canvas id="preloadCanvas" width="100" height="100" style="display:none;"></canvas>

    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row gap-6 h-full">
        <!-- 左側設定區 -->
        <div class="w-full lg:w-80 flex flex-col gap-4 overflow-y-auto pr-1">
            <div class="sidebar-card p-5">
                <div class="flex items-center gap-2 mb-3 text-blue-500 font-bold">
                    <i class="fa-regular fa-star"></i>
                    <span>1. 會員名單 (VIP)</span>
                </div>
                <label class="block w-full">
                    <div class="border-2 border-dashed border-gray-200 rounded-xl p-3 hover:border-blue-400 transition-all cursor-pointer bg-gray-50 text-center">
                        <i class="fa-solid fa-file-csv text-gray-400 mb-1 text-lg"></i>
                        <p class="text-[10px] text-gray-500">上傳 CSV 會員名單</p>
                        <input type="file" id="csvFile" class="hidden" accept=".csv">
                    </div>
                </label>
                <p id="memberStatus" class="mt-2 text-[11px] text-green-600 font-medium hidden"></p>
            </div>

            <div class="sidebar-card p-5">
                <div class="flex items-center gap-2 mb-3 text-red-500 font-bold">
                    <i class="fa-brands fa-youtube"></i>
                    <span>2. 影片留言</span>
                </div>
                <input type="text" id="videoUrl" placeholder="輸入 YouTube 網址" 
                    class="w-full px-3 py-2 bg-gray-100 border-none rounded-lg text-sm focus:ring-2 focus:ring-red-400 outline-none mb-3">
                <button id="fetchBtn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-xl transition-all flex items-center justify-center gap-2">
                    <span id="fetchBtnText">同步 YouTube 數據</span>
                    <div id="fetchLoading" class="loading-spin hidden"></div>
                </button>
                <p id="fetchStatus" class="mt-2 text-[11px] text-gray-400 font-medium text-center"></p>
            </div>

            <div class="sidebar-card p-5">
                <div class="flex items-center gap-2 mb-3 text-purple-500 font-bold">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <span>3. 條件過濾</span>
                </div>
                <input type="text" id="keyword" placeholder="包含關鍵字 (選填)" 
                    class="w-full px-3 py-2 bg-gray-100 border-none rounded-lg text-sm focus:ring-2 focus:ring-purple-400 outline-none">
            </div>
        </div>

        <!-- 右側展示區 -->
        <div class="flex-1 main-display">
            <div id="winnerContainer">
                <div id="idleState" class="text-center">
                    <div class="w-16 h-16 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-trophy text-gray-200 text-2xl"></i>
                    </div>
                    <p class="text-gray-400 font-bold text-sm">請輸入網址並同步留言</p>
                </div>

                <div id="winnerResult" class="hidden yt-comment-wrapper">
                    <div class="yt-avatar-container">
                        <img id="winnerImg" src="" class="yt-avatar">
                        <div id="statusBadge" class="status-badge hidden"></div>
                    </div>

                    <div class="yt-content">
                        <div class="yt-header">
                            <span id="winnerName" class="yt-author"></span>
                            <span id="winnerTime" class="yt-time"></span>
                        </div>
                        <div id="winnerComment" class="yt-text"></div>
                        <div class="yt-actions">
                            <div class="yt-icon-btn"><i class="fa-regular fa-thumbs-up"></i><span id="winnerLikes">0</span></div>
                            <div class="yt-icon-btn"><i class="fa-regular fa-thumbs-down"></i></div>
                            <div class="yt-icon-btn font-medium">回覆</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bottom-control flex flex-col items-center">
                <div class="w-full max-w-sm text-center">
                    <button id="drawBtn" class="w-full bg-black text-white font-black py-4 rounded-2xl text-xl shadow-xl transition-all active:scale-95 disabled:opacity-30">
                        開始開獎
                    </button>
                    <p id="poolInfo" class="mt-3 text-[11px] text-gray-500 font-bold uppercase tracking-widest">抽獎池：0</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyAYQnHhRUEewqTVDZmeTxV6hRXZFt_ZWtY';
        let rawComments = [];
        let memberIds = new Set();
        let finalPool = [];
        let drawIntervalTimer = null;
        const imgCache = new Map();

        function timeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);
            if (isNaN(seconds)) return "1 天前";
            let interval = Math.floor(seconds / 86400);
            if (interval >= 1) return interval + " 天前";
            interval = Math.floor(seconds / 3600);
            if (interval >= 1) return interval + " 小時前";
            return "幾分鐘前";
        }

        async function preloadAvatars(comments) {
            const ctx = document.getElementById('preloadCanvas').getContext('2d');
            const promises = comments.slice(0, 300).map(c => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.crossOrigin = "anonymous";
                    img.onload = () => {
                        ctx.drawImage(img, 0, 0, 1, 1);
                        imgCache.set(c.id, img.src);
                        resolve();
                    };
                    img.onerror = () => resolve();
                    img.src = c.img;
                });
            });
            await Promise.all(promises);
        }

        document.getElementById('csvFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                const text = event.target.result;
                const rows = text.split('\n');
                memberIds.clear();
                rows.forEach(row => {
                    const match = row.match(/UC[a-zA-Z0-9_-]{22}/);
                    if (match) memberIds.add(match[0]);
                });
                document.getElementById('memberStatus').innerText = `✅ 已辨識 ${memberIds.size} 位 VIP 會員`;
                document.getElementById('memberStatus').classList.remove('hidden');
                calculatePool();
            };
            reader.readAsText(file);
        });

        document.getElementById('fetchBtn').addEventListener('click', async () => {
            const url = document.getElementById('videoUrl').value.trim();
            const match = url.match(/^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?)|(shorts\/)|(live\/))\??v?=?([^#&?]*).*/);
            const videoId = (match && match[9].length === 11) ? match[9] : null;
            if (!videoId) return alert('請輸入正確影片網址');

            setLoading(true);
            rawComments = [];
            imgCache.clear();

            try {
                let pageToken = '';
                do {
                    const res = await fetch(`https://www.googleapis.com/youtube/v3/commentThreads?part=snippet&videoId=${videoId}&maxResults=100&pageToken=${pageToken}&key=${API_KEY}`);
                    const data = await res.json();
                    if (data.error) throw new Error(data.error.message);
                    data.items?.forEach(item => {
                        const c = item.snippet.topLevelComment.snippet;
                        rawComments.push({
                            id: c.authorChannelId.value,
                            name: c.authorDisplayName,
                            img: c.authorProfileImageUrl,
                            text: c.textOriginal,
                            likes: c.likeCount || 0,
                            publishedAt: c.publishedAt
                        });
                    });
                    pageToken = data.nextPageToken || '';
                } while (pageToken);

                calculatePool();
                await preloadAvatars(finalPool);
                document.getElementById('fetchStatus').innerText = `已同步 ${rawComments.length} 則留言`;
                document.getElementById('idleState').classList.remove('hidden');
                document.getElementById('winnerResult').classList.add('hidden');
            } catch (e) {
                alert('抓取失敗：' + e.message);
            } finally {
                setLoading(false);
            }
        });

        function setLoading(l) {
            document.getElementById('fetchBtnText').classList.toggle('hidden', l);
            document.getElementById('fetchLoading').classList.toggle('hidden', !l);
            document.getElementById('fetchBtn').disabled = l;
        }

        function calculatePool() {
            const kw = document.getElementById('keyword').value.trim().toLowerCase();
            const filtered = kw ? rawComments.filter(c => c.text.toLowerCase().includes(kw)) : rawComments;
            const seen = new Set();
            finalPool = [];
            filtered.forEach(c => {
                if (!seen.has(c.id)) { seen.add(c.id); finalPool.push(c); }
            });
            document.getElementById('poolInfo').innerText = `抽獎池：${finalPool.length}`;
        }

        document.getElementById('drawBtn').addEventListener('click', () => {
            if (!finalPool.length) return;
            
            const res = document.getElementById('winnerResult');
            res.classList.remove('winner-final-pop', 'hidden');
            res.classList.add('drawing-active');
            document.getElementById('idleState').classList.add('hidden');

            const btn = document.getElementById('drawBtn');
            btn.disabled = true;
            btn.innerText = '正在抽獎...';

            const startTime = Date.now();
            const duration = 2200; 

            drawIntervalTimer = setInterval(() => {
                const randomOne = finalPool[Math.floor(Math.random() * finalPool.length)];
                renderWinner(randomOne, false);
                
                if (Date.now() - startTime >= duration) {
                    clearInterval(drawIntervalTimer);
                    res.classList.remove('drawing-active');
                    const finalWinner = finalPool[Math.floor(Math.random() * finalPool.length)];
                    renderWinner(finalWinner, true);
                    btn.disabled = false;
                    btn.innerText = '再次開獎';
                }
            }, 100);
        });

        function renderWinner(w, isFinal) {
            const badge = document.getElementById('statusBadge');
            const res = document.getElementById('winnerResult');
            
            if (isFinal) {
                res.classList.add('winner-final-pop');
                badge.classList.remove('hidden', 'badge-vip', 'badge-subscribed', 'badge-pop-anim');
                void badge.offsetWidth; 
                if (memberIds.has(w.id)) {
                    badge.innerText = 'VIP';
                    badge.classList.add('badge-vip', 'badge-pop-anim');
                } else {
                    badge.innerText = '已訂閱';
                    badge.classList.add('badge-subscribed', 'badge-pop-anim');
                }
            } else {
                badge.classList.add('hidden');
            }

            document.getElementById('winnerImg').src = imgCache.get(w.id) || w.img;
            document.getElementById('winnerName').innerText = w.name;
            document.getElementById('winnerLikes').innerText = w.likes;
            document.getElementById('winnerTime').innerText = `• ${timeAgo(w.publishedAt)}`;
            document.getElementById('winnerComment').innerText = w.text;
        }
    </script>
</body>
</html>
